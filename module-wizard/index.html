<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QVOX Module-wizard</title>
  <style>
    :root {
      --blauw: #1F3864;
      --blauw-licht: #2f4f8f;
      --rand: #d9dee8;
      --grijs: #f4f6fa;
      --tekst: #1b2537;
      --groen: #1e7d46;
      --oranje: #b7791f;
      --rood: #b02a2a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--tekst);
      background: var(--grijs);
      line-height: 1.5;
    }
    header {
      background: var(--blauw);
      color: #fff;
      padding: 20px 24px;
    }
    header h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: .3px; }
    header p { margin: 4px 0 0; font-size: 13px; color: #c7d2e8; }
    main { max-width: 920px; margin: 0 auto; padding: 24px; }
    .kaart {
      background: #fff;
      border: 1px solid var(--rand);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 18px;
    }
    .kaart h2 { margin: 0 0 12px; font-size: 15px; color: var(--blauw); }
    label.veld { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    textarea {
      width: 100%; min-height: 150px; resize: vertical;
      border: 1px solid var(--rand); border-radius: 8px; padding: 10px 12px;
      font: inherit; color: inherit;
    }
    textarea:focus, input:focus { outline: 2px solid var(--blauw-licht); outline-offset: 1px; }
    input[type=file] { font: inherit; }
    .knop {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--blauw); color: #fff; border: 0; border-radius: 8px;
      padding: 12px 20px; font: inherit; font-weight: 600; cursor: pointer;
      min-height: 44px;
    }
    .knop:hover { background: var(--blauw-licht); }
    .knop:disabled { opacity: .5; cursor: not-allowed; }
    .knop.secundair { background: #fff; color: var(--blauw); border: 1px solid var(--blauw); }
    .melding { font-size: 13px; margin-top: 10px; }
    .melding.ok { color: var(--groen); }
    .melding.fout { color: var(--rood); }
    .fotolijst { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .fototegel {
      position: relative; width: 84px; height: 84px; border-radius: 8px; overflow: hidden;
      border: 1px solid var(--rand); background: #fff;
    }
    .fototegel img { width: 100%; height: 100%; object-fit: cover; }
    .fototegel button {
      position: absolute; top: 2px; right: 2px; border: 0; border-radius: 50%;
      width: 20px; height: 20px; background: rgba(0,0,0,.6); color: #fff; cursor: pointer;
      font-size: 12px; line-height: 20px; padding: 0;
    }
    .modulekaart { border: 1px solid var(--rand); border-radius: 10px; margin-bottom: 12px; background: #fff; }
    .modulekop {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid var(--rand);
    }
    .modulekop h3 { margin: 0; font-size: 14px; color: var(--blauw); }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
    .badge.ja  { background: #e6f4ec; color: var(--groen); }
    .badge.nee { background: #fbeaea; color: var(--rood); }
    .badge.nvt { background: #eef1f6; color: #5a6478; }
    .modulebody { padding: 8px 16px 14px; }
    .intro { font-size: 13px; color: #46516a; margin: 4px 0 12px; }
    .bevinding { border-top: 1px dashed var(--rand); padding: 10px 0; }
    .bevinding:first-of-type { border-top: 0; }
    .bevinding .rij1 { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .nr { font-weight: 700; color: var(--blauw); font-size: 13px; }
    .klasse { font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 999px; }
    .klasse.Laag { background: #eef1f6; color: #5a6478; }
    .klasse.Middel { background: #fff3e0; color: var(--oranje); }
    .klasse.Hoog { background: #fbeaea; color: var(--rood); }
    .meta { font-size: 12px; color: #7a8397; }
    .bevinding p { margin: 4px 0 0; font-size: 13px; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%; animation: draai .8s linear infinite;
    }
    @keyframes draai { to { transform: rotate(360deg); } }
    details { margin-top: 12px; }
    details pre {
      white-space: pre-wrap; word-break: break-word; font-size: 12px;
      background: #0f1626; color: #d7e0f0; padding: 12px; border-radius: 8px; max-height: 340px; overflow: auto;
    }
    .balk { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .hint { font-size: 12px; color: #7a8397; }
  </style>
</head>
<body>
  <header>
    <h1>QVOX Module-wizard</h1>
    <p>Intake + observaties + foto's → AI-concept-dataset per module. Jij corrigeert alleen waar nodig.</p>
  </header>

  <main>
    <!-- 1. Intake -->
    <section class="kaart">
      <h2>1 · Intake</h2>
      <label class="veld" for="intake">intake.json (uit de intake-wizard)</label>
      <input id="intake" type="file" accept="application/json,.json" />
      <div id="intakeMelding" class="melding"></div>
    </section>

    <!-- 2. Observaties -->
    <section class="kaart">
      <h2>2 · Observaties</h2>
      <label class="veld" for="observaties">Wat heb je gezien, gehoord, bijzonderheden — per module of locatie</label>
      <textarea id="observaties" placeholder="Bijv. 'Magazijn: stellingen niet gekeurd, gele keuringsstickers ontbreken. Werkplaats: lasrook-afzuiging aanwezig maar filter vol...'"></textarea>
    </section>

    <!-- 3. Foto's -->
    <section class="kaart">
      <h2>3 · Foto's <span class="hint">(optioneel, meerdere tegelijk)</span></h2>
      <input id="fotos" type="file" accept="image/*" multiple />
      <div id="fotolijst" class="fotolijst"></div>
    </section>

    <!-- 4. Genereren -->
    <section class="kaart">
      <h2>4 · Concept genereren</h2>
      <div class="balk">
        <button id="genereer" class="knop" disabled>Genereer concept</button>
        <button id="download" class="knop secundair" style="display:none">Download dataset.json</button>
        <span id="status" class="melding"></span>
      </div>
      <div id="usage" class="hint" style="margin-top:8px"></div>
    </section>

    <!-- 5. Resultaat -->
    <section id="resultaat"></section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let intakeData = null;
    let fotos = [];            // {naam, base64, type, preview}
    let datasetResultaat = null;

    function zetGenereerKnop() {
      $("genereer").disabled = !intakeData;
    }

    // ---- Intake inladen ----
    $("intake").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      const m = $("intakeMelding");
      if (!file) return;
      try {
        intakeData = JSON.parse(await file.text());
        const naam = intakeData?.bedrijf?.naam || intakeData?.bedrijfsnaam || "onbekend bedrijf";
        const mods = telActieveModules(intakeData);
        m.className = "melding ok";
        m.textContent = `Geladen: ${naam}${mods !== null ? ` — ${mods} actieve module(s)` : ""}.`;
      } catch (err) {
        intakeData = null;
        m.className = "melding fout";
        m.textContent = "Kon dit bestand niet als JSON lezen.";
      }
      zetGenereerKnop();
    });

    function telActieveModules(d) {
      const kandidaten = d?.actieveModules || d?.modules || d?.actieve_modules;
      if (Array.isArray(kandidaten)) return kandidaten.length;
      if (kandidaten && typeof kandidaten === "object") return Object.keys(kandidaten).length;
      return null;
    }

    // ---- Foto's inladen (naar base64) ----
    $("fotos").addEventListener("change", async (e) => {
      for (const file of e.target.files) {
        if (!file.type.startsWith("image/")) continue;
        const dataUrl = await new Promise((res) => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.readAsDataURL(file);
        });
        const base64 = String(dataUrl).split(",")[1] || "";
        fotos.push({ naam: file.name, base64, type: file.type, preview: dataUrl });
      }
      e.target.value = "";
      tekenFotos();
    });

    function tekenFotos() {
      const lijst = $("fotolijst");
      lijst.innerHTML = "";
      fotos.forEach((f, i) => {
        const tegel = document.createElement("div");
        tegel.className = "fototegel";
        tegel.innerHTML = `<img src="${f.preview}" alt="${f.naam}"><button title="Verwijderen">×</button>`;
        tegel.querySelector("button").onclick = () => { fotos.splice(i, 1); tekenFotos(); };
        lijst.appendChild(tegel);
      });
    }

    // ---- Genereren ----
    $("genereer").addEventListener("click", async () => {
      if (!intakeData) return;
      const knop = $("genereer");
      const status = $("status");
      knop.disabled = true;
      knop.innerHTML = '<span class="spinner"></span> Bezig… (dit kan een minuut duren)';
      status.className = "melding";
      status.textContent = "";
      $("download").style.display = "none";
      $("resultaat").innerHTML = "";
      $("usage").textContent = "";

      try {
        const res = await fetch("/genereer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            intake: intakeData,
            observaties: $("observaties").value,
            fotos: fotos.map((f) => ({ naam: f.naam, base64: f.base64, type: f.type })),
          }),
        });
        const data = await res.json();

        if (data.usage) {
          $("usage").textContent =
            `Tokens — invoer: ${data.usage.input_tokens ?? "?"}, uitvoer: ${data.usage.output_tokens ?? "?"}`;
        }

        if (data.dataset) {
          datasetResultaat = data.dataset;
          toonDataset(data.dataset);
          status.className = "melding ok";
          status.textContent = "Concept gegenereerd. Controleer per module.";
          $("download").style.display = "inline-flex";
        } else {
          status.className = "melding fout";
          status.textContent = data.fout || "Geen dataset ontvangen.";
          if (data.raw) toonRauw(data.raw);
        }
      } catch (err) {
        status.className = "melding fout";
        status.textContent = "Verbinding met de server mislukte. Draait server.py nog?";
      } finally {
        knop.disabled = false;
        knop.innerHTML = "Genereer concept";
        zetGenereerKnop();
      }
    });

    // ---- Download ----
    $("download").addEventListener("click", () => {
      if (!datasetResultaat) return;
      const blob = new Blob([JSON.stringify(datasetResultaat, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const naam = (datasetResultaat?.bedrijf?.naam || "dataset").replace(/[^\w-]+/g, "_");
      a.href = url; a.download = `${naam}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // ---- Resultaat tekenen ----
    function toonDataset(dataset) {
      const modules = dataset?.modules;
      const wrap = $("resultaat");
      if (!Array.isArray(modules) || modules.length === 0) {
        toonRauw(JSON.stringify(dataset, null, 2));
        return;
      }
      wrap.innerHTML = "";
      for (const mod of modules) {
        const vragen = Array.isArray(mod?.vragen) ? mod.vragen : [];
        const ja = vragen.filter((v) => v.antwoord === "Ja").length;
        const nee = vragen.filter((v) => v.antwoord === "Nee").length;
        const nvt = vragen.filter((v) => v.antwoord === "NVT").length;

        const kaart = document.createElement("div");
        kaart.className = "modulekaart";

        const neeRijen = vragen
          .filter((v) => v.antwoord === "Nee")
          .map((v) => {
            const klasse = v.klasse || "";
            const R = v.kinney && v.kinney.R != null ? `R=${v.kinney.R}` : "";
            const brf = v.brf_categorie ? ` · ${escape(v.brf_categorie)}` : "";
            return `
              <div class="bevinding">
                <div class="rij1">
                  <span class="nr">${escape(v.nr ?? "")}</span>
                  ${klasse ? `<span class="klasse ${escape(klasse)}">${escape(klasse)}</span>` : ""}
                  <span class="meta">${R}${brf}</span>
                </div>
                <p>${escape(v.bevinding || "")}</p>
              </div>`;
          })
          .join("");

        kaart.innerHTML = `
          <div class="modulekop">
            <h3>${escape(mod.code ? mod.code + " · " : "")}${escape(mod.titel || mod.naam || "Module")}</h3>
            <div class="badges">
              <span class="badge ja">${ja} Ja</span>
              <span class="badge nee">${nee} Nee</span>
              <span class="badge nvt">${nvt} NVT</span>
            </div>
          </div>
          <div class="modulebody">
            ${mod.intro ? `<div class="intro">${escape(mod.intro)}</div>` : ""}
            ${nee > 0 ? neeRijen : '<div class="hint">Geen Nee-bevindingen in deze module.</div>'}
          </div>`;
        wrap.appendChild(kaart);
      }
    }

    function toonRauw(tekst) {
      const wrap = $("resultaat");
      const det = document.createElement("details");
      det.open = true;
      det.innerHTML = `<summary>Ruwe modeluitvoer (kon niet als dataset worden weergegeven)</summary><pre>${escape(tekst)}</pre>`;
      wrap.appendChild(det);
    }

    function escape(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
  </script>
</body>
</html>
